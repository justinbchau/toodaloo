name: Production release (iOS)

# Manually triggered:  eas workflow:run production-release.yml
# 1. Builds a store-distribution iOS binary against prod Supabase
#    (EXPO_PUBLIC_SUPABASE_* come from EAS project secrets).
# 2. Submits it to App Store Connect / TestFlight using the ASC API key
#    configured in eas.json submit.production.ios.
#
# For JS-only fixes you do NOT need this workflow — publish an over-the-air
# update instead:  eas update --channel production --message "..."
# (see docs/RELEASE.md for the full runbook).
on:
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production
  submit_ios:
    name: Submit to TestFlight
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
