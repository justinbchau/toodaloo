<!-- toodaloo — GitHub Pages landing. Keeps the Pages root from 404ing and links to the policy. -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>toodaloo</title>
<style>
  :root { color-scheme: light dark; --bg: #ffffff; --fg: #1a1a22; --accent: #6c5ce7; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0d0d14; --fg: #eaeaf2; --accent: #a99ff9; }
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    padding: 24px;
  }
  h1 { font-size: 28px; letter-spacing: -0.5px; color: var(--accent); margin: 0; }
  a { color: var(--accent); font-size: 16px; }
</style>
<body>
  <h1>toodaloo</h1>
  <p>Find a clean bathroom, right now.</p>
  <p><a href="./legal/">Terms &amp; Privacy</a></p>
</body>
